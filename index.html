<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 돌봄 서비스 — 프로토타입 (AI Agent Enhanced)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ══ SHARED BASE ══ */
:root {
  --g50:#E8F5EE; --g100:#B8E0CC; --g400:#1D9E75; --g600:#0F6E56; --g800:#085041;
  --a50:#FEF3E2; --a400:#F59E0B; --a600:#B45309;
  --r50:#FEF2F2; --r200:#FECACA; --r400:#EF4444; --r600:#DC2626;
  --b50:#EFF6FF; --b400:#3B82F6; --b600:#1D4ED8;
  --p50:#F5F3FF; --p400:#8B5CF6; --p600:#6D28D9;
  --bg:#F4F6F4; --surface:#fff; --border:#E4EBE6;
  --text:#111; --text2:#4B5563; --text3:#9CA3AF;
  --sidebar-w:220px;
  --shared-topbar:48px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ══ SHARED TOPBAR ══ */
.shared-bar{
  position:fixed;top:0;left:0;right:0;height:var(--shared-topbar);
  background:var(--g800);display:flex;align-items:center;padding:0 20px;
  z-index:300;gap:14px;border-bottom:1px solid rgba(255,255,255,.1);
}
.sb-logo-area{display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:26px;height:26px;border-radius:7px;background:var(--g400);display:flex;align-items:center;justify-content:center}
.sb-logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-left:2px}
.mode-tabs{margin-left:auto;display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:8px;padding:3px}
.mode-tab{padding:5px 16px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.6);background:transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
.mode-tab.active{background:#fff;color:var(--g600)}

/* ══ CORP VIEW ══ */
#corp-view{display:flex;padding-top:var(--shared-topbar);min-height:100vh}
#corp-view .sidebar{width:var(--sidebar-w);background:var(--g800);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:var(--shared-topbar);left:0;bottom:0;z-index:100}
#corp-view .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:calc(100vh - var(--shared-topbar))}
#corp-view .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:var(--shared-topbar);z-index:50}

/* ══ WORKER VIEW ══ */
#worker-view{display:none;padding-top:var(--shared-topbar);min-height:100vh}

/* ══ CORP CSS ══ */

:root {
  --g50:#E8F5EE; --g100:#B8E0CC; --g400:#1D9E75; --g600:#0F6E56; --g800:#085041;
  --a50:#FEF3E2;  --a400:#F59E0B; --a600:#B45309;
  --r50:#FEF2F2;  --r200:#FECACA; --r400:#EF4444; --r600:#DC2626;
  --b50:#EFF6FF;  --b400:#3B82F6; --b600:#1D4ED8;
  --p50:#F5F3FF;  --p400:#8B5CF6; --p600:#6D28D9;
  --bg:#F4F6F4; --surface:#fff; --border:#E4EBE6;
  --text:#111; --text2:#4B5563; --text3:#9CA3AF;
  --sidebar-w: 220px;
}
*{box-sizing:border-box;margin:0;padding:0}


/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--g800);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:48px;left:0;bottom:0;z-index:100}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:9px}
.sb-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--g400);display:flex;align-items:center;justify-content:center}
.sb-logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;opacity:.5;margin-top:1px;font-weight:400}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.35);padding:10px 10px 4px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;transition:all .15s;position:relative}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:var(--g600);color:#fff;font-weight:600}
.sb-item .ti{font-size:17px;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--r400);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.sb-badge.green{background:var(--g400)}
.sb-bottom{padding:14px 10px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer}
.sb-user:hover{background:rgba(255,255,255,.08)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--g600);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:#fff}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.45)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:calc(100vh - 48px)}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;color:var(--g800);letter-spacing:-.3px}
.topbar-date{font-size:12px;color:var(--text3);margin-left:auto}
.topbar-notif{width:34px;height:34px;border-radius:8px;background:var(--r50);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--r400);border:2px solid var(--surface)}

.content{flex:1;padding:28px;overflow-y:auto}

/* ── CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border-radius:14px;padding:18px 20px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;right:-16px;top:-16px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:3px}
.kpi-label{font-size:12px;color:var(--text3);font-weight:500}
.kpi-delta{font-size:11px;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border)}
.card-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.card-
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}

/* ── ROI BANNER ── */
.roi-banner{background:linear-gradient(135deg,var(--g800) 0%,var(--g600) 100%);border-radius:16px;padding:24px 28px;margin-bottom:24px;color:#fff;display:flex;align-items:center;gap:32px;position:relative;overflow:hidden}
.roi-banner::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
.roi-stat{text-align:center}
.roi-stat-n{font-size:28px;font-weight:700;letter-spacing:-.5px}
.roi-stat-l{font-size:11px;opacity:.7;margin-top:3px;line-height:1.4;max-width:100px}
.roi-divider{width:1px;height:48px;background:rgba(255,255,255,.2)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--text3);text-align:left;padding:9px 14px;border-bottom:1.5px solid var(--border);letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:#F9FBF9}
.tbl tbody tr.selected{background:var(--g50)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge.green{background:var(--g50);color:var(--g600)}
.badge.red{background:var(--r50);color:var(--r600)}
.badge.amber{background:var(--a50);color:var(--a600)}
.badge.blue{background:var(--b50);color:var(--b600)}
.badge.purple{background:var(--p50);color:var(--p600)}
.badge.gray{background:#F3F4F6;color:#6B7280}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--g600);color:#fff}
.btn-primary:hover{background:var(--g800)}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-red{background:var(--r600);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;padding-bottom:18px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:30px;bottom:0;width:1px;background:var(--border)}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;z-index:1}
.tl-
.tl-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-time{font-size:11px;color:var(--text3)}
.tl-desc{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.6}
.tl-evidence{background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:8px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}

/* ── DETAIL PANEL ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:520px;background:var(--surface);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 40px rgba(0,0,0,.15)}
.detail-panel.open{transform:translateX(0)}
.dp-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
.dp-
.dp-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.dp-section{margin-bottom:24px}
.dp-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* ── STATS BAR ── */
.stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stat-bar-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
.stat-bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.stat-bar-val{font-size:12px;font-weight:600;color:var(--text);width:36px;text-align:right;flex-shrink:0}

/* ── CHAT BUBBLE ── */
.conv-item{margin-bottom:8px}
.conv-speaker{font-size:10px;font-weight:700;margin-bottom:3px}
.conv-bubble{display:inline-block;padding:7px 11px;border-radius:10px;font-size:12px;line-height:1.5;max-width:340px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}

/* ── MISC ── */
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.ml-auto{margin-left:auto}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--text3)}.fw-600{font-weight:600}
.mt-4{margin-top:16px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.divider-h{height:1px;background:var(--border);margin:16px 0}
.video-thumb{background:#111;border-radius:10px;height:90px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;position:relative;overflow:hidden}
.video-thumb::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.3)}
.video-play{z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}


/* ══ WORKER CSS ══ */

*{box-sizing:border-box;margin:0;padding:0}

h1.pt{font-size:12px;color:#888;letter-spacing:.5px;font-weight:500}
/* Shell */
.shell{width:100%;max-width:980px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.12)}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid #eee}
.logo{font-weight:700;color:#0F6E56;font-size:16px;display:flex;align-items:center;gap:7px;letter-spacing:-.3px}
.mode-row{margin-left:auto;display:flex;gap:4px;background:#f2f4f2;border-radius:10px;padding:3px}
.mode-btn{padding:7px 16px;font-size:12px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .18s;display:flex;align-items:center;gap:5px}
.mode-btn.active{background:#fff;color:#0F6E56;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.mode-btn:not(.active){background:transparent;color:#999}
/* Corp */
.corp-wrap{display:flex;height:760px}
.sidebar{width:186px;border-right:1px solid #eee;padding:16px 12px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;background:#fafafa}
.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 12px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;border-radius:10px;width:100%;text-align:left;color:#888;font-weight:500;transition:all .15s}
.nav-btn.active{background:#E1F5EE;color:#0F6E56;font-weight:700}
.ai-hint{margin-top:auto;background:linear-gradient(135deg,#E1F5EE,#d0f0e5);border-radius:12px;padding:12px}
.corp-body{flex:1;overflow-y:auto;background:#f6f8f6}
.cscreen{padding:24px;min-height:100%}
.page-hdr{margin-bottom:20px}
.page-hdr h2{font-size:20px;font-weight:700;color:#085041;letter-spacing:-.5px}
.page-hdr p{font-size:12px;color:#aaa;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{border-radius:14px;padding:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:14px;padding:15px;border:1px solid #eee}
.card-title{font-size:13px;font-weight:700;color:#333;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.bar-track{background:#f0f0f0;border-radius:4px;height:7px;flex:1}
.bar-fill{height:100%;border-radius:4px}
.row-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5}
.row-item:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#f0f0f0;color:#666;font-weight:500}
/* Phone */
.app-wrap{display:flex;flex-direction:column;align-items:center;padding:24px;background:linear-gradient(145deg,#dceae1,#e8f0ea);min-height:820px;gap:16px}
/* Flow label */
.flow-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:#666;background:rgba(255,255,255,.6);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px}
.phone{width:368px;background:#fff;border-radius:46px;overflow:hidden;border:8px solid #111;box-shadow:0 20px 64px rgba(0,0,0,.22);flex-shrink:0;position:relative}
.status-bar{padding:12px 22px 0;display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#222}
.pscreen{height:590px;overflow-y:auto;background:#f5f7f5}
.pnav{display:flex;border-top:1px solid #eee;background:#fff;padding-bottom:10px}
.pnav-btn{flex:1;padding:10px 0 4px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;color:#c0c7c2;position:relative;transition:color .15s}
.pnav-btn.active{color:#0F6E56}
.pnav-btn .ti{font-size:22px}
.pnav-btn span{font-size:9px;font-weight:700;letter-spacing:.3px}
.adot{position:absolute;top:7px;right:10px;width:7px;height:7px;border-radius:50%;background:#E24B4A}
/* Worker screens */
.ws{padding:20px;background:#f5f7f5;min-height:100%}
/* Login / 출근 */
.grad-bg{background:linear-gradient(160deg,#0F6E56,#1D9E75 60%,#5DCAA5);min-height:100%;padding:32px 22px;display:flex;flex-direction:column}
/* Report sections */
.rsec{margin-bottom:14px;border:1px solid #eee;border-radius:12px;overflow:hidden}
.rsec-hdr{background:#f8faf9;padding:9px 13px;font-size:12px;font-weight:700;color:#0F6E56;display:flex;align-items:center;gap:6px;border-bottom:1px solid #eee}
.rsec-body{padding:11px 13px}
.rrow{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.rrow:last-child{border-bottom:none}
.rkey{font-size:11px;color:#aaa;width:76px;flex-shrink:0;padding-top:1px}
.rval{font-size:12px;color:#333;flex:1;line-height:1.6}
/* Checklist */
.cl-section{margin-bottom:14px}
.cl-sec-title{font-size:12px;font-weight:700;color:#333;margin-bottom:8px;display:flex;align-items:center;gap:6px;letter-spacing:-.2px}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:10px;margin-bottom:5px;background:#fff;border:1px solid #eee}
.cl-item.warn{background:#FAEEDA;border-color:#FAC775}
.cl-item.unchecked{background:#f8f8f8;border-color:#eee;opacity:.8}
.cl-check{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #ddd;background:#fff;margin-top:1px}
.cl-check.done{background:#1D9E75;border-color:#1D9E75}
.cl-text{flex:1;font-size:12px;color:#333;line-height:1.5}
.cl-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;flex-shrink:0}
/* Step bar */
.step-bar{display:flex;align-items:flex-start;margin-bottom:18px}
.snode{display:flex;flex-direction:column;align-items:center;gap:3px}
.scircle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.sline{flex:1;height:1.5px;margin-top:11px}
.slabel{font-size:9px;font-weight:700;letter-spacing:.2px}
/* Animations */
@keyframes wv{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.wave-bar{width:4px;border-radius:3px;background:#1D9E75;transform-origin:bottom;transition:background .3s,height .3s}
.pulse-dot{animation:pulse 1.2s ease-in-out infinite}
.spin{animation:spin .8s linear infinite}
.fade-in{animation:fadeIn .25s ease both}

/* ══ ENHANCED: Agent Monitor Panel ══ */
.agent-monitor{
  position:absolute;bottom:60px;right:8px;width:220px;
  background:#1a1a2e;color:#fff;border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:50;
  font-size:10px;overflow:hidden;
  transition:all .2s ease;
}
.agent-monitor.collapsed{height:32px;width:140px;border-radius:16px}
.agent-monitor .am-header{
  padding:7px 10px;background:rgba(255,255,255,.08);
  display:flex;align-items:center;gap:5px;cursor:pointer;
  font-weight:700;font-size:10px;
}
.agent-monitor .am-body{
  max-height:180px;overflow-y:auto;padding:6px 8px;
}
.agent-monitor.collapsed .am-body{display:none}
.am-entry{
  padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06);
  line-height:1.4;opacity:.85;
}
.am-entry:last-child{border-bottom:none}

/* ══ ENHANCED: Agent step animations ══ */
@keyframes agentStepIn{
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}
.agent-step{animation:agentStepIn .4s ease both}

@keyframes piiFlash{
  0%,100%{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)}
  50%{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.5)}
}
.pii-flash{animation:piiFlash .6s ease 2}

@keyframes typingDots{
  0%,80%,100%{opacity:.3}
  40%{opacity:1}
}
.typing-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#1D9E75;margin:0 1px;animation:typingDots 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

  padding:4px 8px;border-radius:6px;margin-bottom:3px;

.tool-item.done{background:#0F6E56;color:#fff}

}

  background:linear-gradient(135deg,#EEEDFE,#E6F1FB);
  border-radius:10px;padding:9px 12px;margin-bottom:10px;
  border:1px solid #d0d0f0;
}

/* Diet safety monitor */
.diet-panel{background:#fff;border:1px solid #e8ebe9;border-radius:14px;padding:12px;margin-bottom:12px}
.diet-panel-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.diet-plate{
  background:linear-gradient(145deg,#f5f0e8,#ebe4d8);border-radius:50%;
  width:100%;aspect-ratio:1;max-width:200px;margin:0 auto 10px;
  position:relative;border:3px solid #ddd;box-shadow:inset 0 2px 12px rgba(0,0,0,.06);

.diet-plate-inner{position:absolute;inset:12%;border-radius:50%;background:#faf8f4}
.diet-food-chip{

.diet-food-chip.danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}

/* ══ MODE SWITCH ══ */
function switchMode(mode) {
  document.getElementById('corp-view').style.display   = mode === 'corp'   ? 'flex' : 'none';
  document.getElementById('worker-view').style.display = mode === 'worker' ? 'block': 'none';
  document.getElementById('tab-corp').classList.toggle('active',   mode === 'corp');
  document.getElementById('tab-worker').classList.toggle('active', mode === 'worker');
  if (mode === 'worker') {
    const vw = document.getElementById('view-worker');
    if (vw) vw.style.display = 'block';
    const vc = document.getElementById('view-corporate');
    if (vc) vc.style.display = 'none';
    renderW();
  }
  if (mode === 'corp') render();
}

/* ══════════ STATE ══════════ */
let S = { page: 'dashboard', reportFilter: '전체', protFilter: '전체', selReport: null, selEvent: null };

/* ══════════ NAV ══════════ */
function goTo(page) {
  S.page = page;
  S.selReport = null;
  S.selEvent = null;
  closePanel();
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  const titles = {dashboard:'대시보드', protection:'보호 이벤트', reports:'보고서 수신함', staff:'인력 현황', recipients:'수급자 관리'};
  document.getElementById('topbar-title').textContent = titles[page] || page;
  render();
}

function openPanel(header, body, footer) {
  document.getElementById('dp-header').innerHTML = header;
  document.getElementById('dp-body').innerHTML = body;
  document.getElementById('dp-footer').innerHTML = footer;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

/* ══════════ RENDER ══════════ */
function render() {
  const c = document.getElementById('content');
  if (S.page === 'dashboard')   c.innerHTML = renderDashboard();
  else if (S.page === 'protection') c.innerHTML = renderProtection();
  else if (S.page === 'reports') c.innerHTML = renderReports();
  else if (S.page === 'staff')  c.innerHTML = renderStaff();
  else if (S.page === 'recipients') c.innerHTML = renderRecipients();
}

    let hit=null;
    for(const rid of restrictions){
      const rule=DIET_RULES[rid];
      if(!rule) continue;
      if(db.tags.some(t=>rule.tags.includes(t))){hit=rule;break;}
    }
    const conf=+(0.82+Math.random()*0.14).toFixed(2);
    if(!hit) return {name,conf,safe:true,level:null,tts:null,mp3:null};
    return {name,conf,safe:false,level:hit.level,tts:hit.tts(name),rule:hit.label,mp3:hit.mp3||null};
  });
}
function getWorstDietAlert(plate){
  const order={'높음':3,'중간':2,'낮음':1};
  const bad=plate.filter(f=>!f.safe);
  if(!bad.length) return null;
  return bad.sort((a,b)=>(order[b.level]||0)-(order[a.level]||0))[0];
}

/* ═══ V1 Simulation — voice cycling + conversation appearing ═══ */
function startV1Simulation(){
  clearV1Timers();
  G.v1ConvShown=0;
  G.v1Speaking=false;
  G.dietPlate=null;
  G.dietAlert=null;
  G.dietConfirmed=false;
  G.dietScanning=false;
  G.dietScanDone=false;
  addAgentLog('📊 파형분석: 녹음 시작');
  addAgentLog('🔒 PII Agent: 실시간 모니터링 활성');
  addAgentLog('🍽 식이 Agent: 대기 중 — 「식판 스캔」 버튼으로 시작');

  // Cycle: silence(2s) → speaking(3s) → silence → speaking...
  let cycle=0;
  function doCycle(){
    if(G.visitStep!==1) return;
    const speaking=(cycle%2===1);
    G.v1Speaking=speaking;
    updateV1VoiceStatus(speaking);
    if(speaking && G.v1ConvShown<CONV.length){
      // Show typing, then conv item
      const typEl=document.getElementById('v1-typing');
      if(typEl) typEl.style.display='block';
      addAgentLog('📊 파형분석: 음성 감지 → Whisper 호출');
      const t2=setTimeout(()=>{
        if(G.visitStep!==1) return;
        showNextConvItem();
        if(typEl) typEl.style.display=G.v1ConvShown<CONV.length?'block':'none';
      },1500);
      G.v1Timers.push(t2);
    }
    // PII flash at cycle 3
    if(cycle===3){
      const t3=setTimeout(()=>{
        if(G.visitStep!==1) return;
        const pii=document.getElementById('v1-pii-badge');
        const piiText=document.getElementById('v1-pii-text');
        if(pii){pii.classList.add('pii-flash');pii.style.borderColor='#F59E0B';}
        if(piiText){piiText.textContent='⚠ PII 감지 → "김순자" 마스킹 처리';}
        addAgentLog('🔒 PII Agent: \'김순자\' → \'○○○\' 마스킹');
        const t4=setTimeout(()=>{
          if(pii){pii.classList.remove('pii-flash');pii.style.borderColor='#d0eadf';}
          if(piiText){piiText.textContent='마스킹 완료 — 계속 모니터링 중';}
        },2500);
        G.v1Timers.push(t4);
      },1000);
      G.v1Timers.push(t3);
    }
    // 복약 알림 at cycle 5 (식판 스캔 중이면 잠시 대기)
    if(cycle===5){
      const tMed=setTimeout(()=>{
        if(G.visitStep!==1) return;
        if(G.dietScanning){
          const tRetry=setTimeout(()=>{
            if(G.visitStep===1&&!G.dietScanning) triggerMedicationAlert();
          },3500);
          G.v1Timers.push(tRetry);
          return;
        }
        triggerMedicationAlert();
      },1200);
      G.v1Timers.push(tMed);
    }
    // 폭언 파형 감지 AI at cycle 7
    if(cycle===7){
      const tAbuse=setTimeout(()=>{
        if(G.visitStep!==1) return;
        triggerAbuseDetection();
      },1000);
      G.v1Timers.push(tAbuse);
    }
    cycle++;
    if(cycle<12){
      const t=setTimeout(doCycle, speaking?3000:2000);
      G.v1Timers.push(t);
    }
  }
  const t0=setTimeout(doCycle,500);
  G.v1Timers.push(t0);
}

/* ═══ 식이 안전: 바디캠 파이프라인 · 규칙 엔진 · TTS (버튼 수동 실행) ═══ */
function resetDietPanelUI(){

  const scanMsg=document.getElementById('v1-diet-scan-msg');
  if(scanMsg) scanMsg.textContent='식사 보조 시 아래 버튼으로 식판을 스캔하세요';
  const scanBtn=document.getElementById('v1-diet-scan-btn');
  if(scanBtn){
    scanBtn.disabled=false;
    scanBtn.innerHTML='<i class="ti ti-scan"></i> 식판 스캔';
    scanBtn.style.opacity='1';
  }
}
function onDietScanClick(){
  if(G.visitStep!==1) return;
  if(G.dietScanning||G.dietScanDone) return;
  G.dietScanning=true;
  G.dietConfirmed=false;
  const scanBtn=document.getElementById('v1-diet-scan-btn');
  if(scanBtn){
    scanBtn.disabled=true;
    scanBtn.innerHTML='<span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;vertical-align:middle"></span> 스캔 중...';
  }
  const alertEl=document.getElementById('v1-diet-alert');
  if(alertEl) alertEl.style.display='none';
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  G.dietPlate=getDietPlate(G.visitRec);
  G.dietAlert=getWorstDietAlert(G.dietPlate);
  addAgentLog('🍽 식이 Agent: 식판 스캔 시작 (수동)');
  runDietPipeline();
}
function finishDietScan(){
  G.dietScanning=false;
  G.dietScanDone=true;
  const scanBtn=document.getElementById('v1-diet-scan-btn');
  if(scanBtn){
    scanBtn.disabled=true;
    scanBtn.innerHTML='<i class="ti ti-circle-check"></i> 스캔 완료';
  }
}
function setDietPipeStep(idx,done){
  document.querySelectorAll('#v1-diet-pipe .diet-pipe-step').forEach((el,i)=>{
    el.classList.remove('on','done');
    if(i<idx||(done&&i===idx)) el.classList.add('done');
    else if(i===idx&&!done) el.classList.add('on');
  });
}
function renderDietChips(upto){
  const box=document.getElementById('v1-diet-chips');
  if(!box||!G.dietPlate) return;
  box.innerHTML='';
  const items=G.dietPlate.slice(0,upto+1);
  items.forEach((f,i)=>{
    const db=DIET_FOOD_DB[f.name]||{pos:{top:'50%',left:'50%'}};
    const cls=f.safe?'safe':(f.level==='높음'?'danger':'warn');
    const chip=document.createElement('div');
    chip.className='diet-food-chip '+cls+(i===upto?' scan':'');
    chip.style.top=db.pos.top; chip.style.left=db.pos.left;
    chip.textContent=f.name+(f.safe?'':' !');
    chip.title=f.safe?'안전':(f.level+' · '+Math.round(f.conf*100)+'%');
    box.appendChild(chip);
  });
}
function runDietPipeline(){
  if(!G.dietScanning) return;
  const rec=MY_RECS[G.visitRec];
  const scanMsg=document.getElementById('v1-diet-scan-msg');
  const steps=[
    {msg:'YOLO: 식판 영역 탐지...',log:'🍽 탐지: 식판 bbox 확보',pipe:0},
    {msg:'음식 분류 중 (5종)...',log:'🍽 분류: 개별 음식 crop',pipe:1},
    {msg:'영양·위험 태그 매칭...',log:'🍽 태그: 나트륨·당·연하 태그 연결',pipe:2},
    {msg:'대상자 식이 규칙 비교...',log:'🍽 규칙: '+rec.dietRestrict+' 대조',pipe:3},
  ];
  let i=0;
  function next(){
    if(G.visitStep!==1||!G.dietScanning) return;
    if(i<steps.length){
      if(scanMsg) scanMsg.textContent=steps[i].msg;
      setDietPipeStep(steps[i].pipe,false);
      addAgentLog(steps[i].log);
      renderDietChips(Math.min(i, G.dietPlate.length-1));
      i++;
      const t=setTimeout(next,900);
      G.v1Timers.push(t);
      return;
    }
    setDietPipeStep(4,true);
    renderDietChips(G.dietPlate.length-1);
    document.querySelectorAll('.diet-food-chip.scan').forEach(el=>el.classList.remove('scan'));
    if(scanMsg) scanMsg.textContent='스캔 완료 · '+G.dietPlate.length+'종 인식';
    finishDietScan();
    if(G.dietAlert) showDietVoiceAlert(G.dietAlert);
    else if(scanMsg) scanMsg.textContent+=' · 위험 음식 없음';
  }
  next();
}
function showDietVoiceAlert(alert){
  const rec=MY_RECS[G.visitRec];
  const alertEl=document.getElementById('v1-diet-alert');
  if(!alertEl) return;
  const lvlCls=alert.level==='높음'?'diet-alert-high':alert.level==='중간'?'diet-alert-mid':'diet-alert-low';
  alertEl.className=alertEl.className.replace(/diet-alert-\w+/g,'')+' '+lvlCls;
  alertEl.style.display='block';
  alertEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  const sub=document.getElementById('v1-diet-sub');
  const msg=document.getElementById('v1-diet-msg');
  const lvl=document.getElementById('v1-diet-level');
  if(sub) sub.textContent='감지: '+alert.name+' · 규칙: '+alert.rule;
  if(msg) msg.textContent=alert.tts;
  if(lvl) lvl.textContent=alert.level;
  const c12=CL_DATA[2].items.find(x=>x.id==='c12');
  if(c12){c12.text='식이 안전 경고 확인 ('+alert.name+')';c12.quote=alert.name+' → '+alert.rule+' · '+alert.level;}
  addAgentLog('🍽 식이 Agent: '+alert.name+' → '+alert.level+' 위험');
  addAgentLog('🔊 TTS: 식이 안전 음성 안내');
  speakDietWarning(alert.tts, alert.mp3);
}
function speakDietWarning(text, mp3File){
  // mp3 파일이 있으면 우선 재생
  if(mp3File){
    if(G.dietAudio){G.dietAudio.pause();G.dietAudio.currentTime=0;}
    const audio=new Audio(mp3File);
    G.dietAudio=audio;
    audio.volume=1.0;
    audio.onerror=function(){ speakDietWarningFallback(text); };
    audio.play().catch(()=>speakDietWarningFallback(text));
    return;
  }
  speakDietWarningFallback(text);
}
function speakDietWarningFallback(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.92; u.pitch=1.0; u.volume=1.0;
  setTimeout(()=>{
    const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith('ko'));
    if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  },200);
}
function confirmDietCheck(){
  G.dietConfirmed=true;
  G.clChecks['c12']=true;
  const btn=document.getElementById('v1-diet-btn');
  if(btn){btn.innerHTML='<i class="ti ti-circle-check"></i> 확인 기록됨';btn.disabled=true;}

function triggerMedicationAlert(){

function speakMedicationReminder(){
  // 이전 재생 중단
  if(G.medAudio){G.medAudio.pause();G.medAudio.currentTime=0;}

  const audio=new Audio('voice/복약.mp3');
  G.medAudio=audio;
  audio.volume=1.0;

  audio.onended=function(){
    const status=document.getElementById('v1-med-status');
    if(status) status.innerHTML='✅ 음성 안내 완료 — 복약 확인 대기';
    addAgentLog('🔊 TTS: 음성 안내 완료');
  };

  audio.onerror=function(){
    // mp3 로드 실패 시 fallback: 브라우저 TTS
    if(!('speechSynthesis' in window)) return;
    const rec=MY_RECS[G.visitRec];
    const msg=new SpeechSynthesisUtterance(
      `${rec.name} 어르신, 지금 복약 시간입니다. 아모디핀 5밀리그램, 한 알을 물과 함께 복용해 주세요.`
    );
    msg.lang='ko-KR'; msg.rate=0.9;
    msg.onend=function(){
      const status=document.getElementById('v1-med-status');
      if(status) status.innerHTML='✅ 음성 안내 완료 — 복약 확인 대기';
      addAgentLog('🔊 TTS: 음성 안내 완료 (fallback)');
    };
    setTimeout(()=>window.speechSynthesis.speak(msg),200);
  };

  audio.play().catch(()=>audio.onerror());
}

  // 3) 폭언 감지 카드 표시
  const t1=setTimeout(()=>{
    if(G.visitStep!==1) return;
    const card=document.getElementById('v1-abuse-card');

      card.style.display='block';
      card.scrollIntoView({behavior:'smooth',block:'nearest'});

  // 4) Agent 추론 단계 시뮬레이션
  const abuseAgentSteps=[
    {delay:1500, text:'① 파형 스펙트로그램 분석: 고주파 에너지 급증 (3kHz~8kHz 대역)', log:'🛡️ 파형AI: 고주파 에너지 급증 감지'},
    {delay:2800, text:'② 음성 감정 분류 모델: 분노(anger) 0.89, 공포(fear) 0.07', log:'🛡️ 파형AI: 감정분류 — anger 0.89'},
    {delay:4000, text:'③ 폭언 키워드 매칭: 위협적 발화 감지 (2개 구간)', log:'🛡️ 파형AI: 위협 키워드 2건 감지'},
    {delay:5200, text:'④ 종합 판정: 폭언 확정 → 카메라 자동 전환 · 증거 수집 시작', log:'🛡️ 파형AI: 폭언 확정 → 영상 증거 수집 시작', showCam:true},
    {delay:6500, text:'⑤ 기관 자동 알림 발송 완료', log:'🛡️ 파형AI: 기관 알림 전송 완료'},
  ];

  abuseAgentSteps.forEach(s=>{
    const t=setTimeout(()=>{
      if(G.visitStep!==1) return;
      const stepsEl=document.getElementById('v1-abuse-agent-steps');

        const step=document.createElement('div');

        step.style.cssText='color:rgba(255,255,255,.85)';

  const tDismiss=setTimeout(()=>{
    if(G.visitStep!==1) return;

    G.abuseDetected=false;
  },10000);
  G.abuseTimers.push(tDismiss);
}

/* ═══ Camera recording simulation ═══ */
function startCamSimulation(){
  const cam=document.getElementById('v1-abuse-cam');
  if(!cam) return;
  cam.style.display='block';
  cam.scrollIntoView({behavior:'smooth',block:'nearest'});
  addAgentLog('📹 바디캠: 자동 전환 — 영상 증거 수집 시작');

  // 비디오 재생 시작
  const video=document.getElementById('v1-cam-video');
  if(video){
    video.currentTime=0;
    video.play().catch(()=>{});
  }

  let sec=0;
  G.camInterval=setInterval(()=>{
    sec++;
    const m=String(Math.floor(sec/60)).padStart(2,'0');
    const s=String(sec%60).padStart(2,'0');
    const timerEl=document.getElementById('v1-cam-timer');
    if(timerEl) timerEl.textContent=m+':'+s;
    // 타임스탬프도 업데이트
    const tsEl=document.getElementById('v1-cam-ts');
    if(tsEl){
      const now=new Date();
      const hh=String(now.getHours()).padStart(2,'0');
      const mm=String(now.getMinutes()).padStart(2,'0');
      const ss=String(now.getSeconds()).padStart(2,'0');
      tsEl.textContent='2026.05.16 '+hh+':'+mm+':'+ss;
    }
    // 업로드 상태 변화
    const uploadEl=document.getElementById('v1-cam-upload');
    if(uploadEl){
      if(sec<=2) uploadEl.textContent='서버 연결 중...';
      else if(sec<=4) uploadEl.textContent='암호화 전송 중';
      else uploadEl.textContent='실시간 업로드';
    }
  },1000);
}

function stopCamSimulation(){
  if(G.camInterval){clearInterval(G.camInterval);G.camInterval=null;}
  const video=document.getElementById('v1-cam-video');
  if(video){video.pause();video.currentTime=0;}
}

function clearAbuseDetection(){
  G.abuseTimers.forEach(t=>clearTimeout(t));
  G.abuseTimers=[];
  G.abuseDetected=false;
  stopCamSimulation();
  // 파형 바 색상 복원
  for(let i=0;i<20;i++){
    const b=document.getElementById('wb'+i);
    if(b){
      b.style.background='';
      b.style.animationDuration='';
    }
  }
}

function saveEditItem(id, isCustom) {
  const ta = document.getElementById('edit-' + id);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;
  if (isCustom) {
    const item = G.clCustomItems.find(c => c.id === id);
    if (item) item.text = newText;
  } else {
    CL_DATA.forEach(sec => {
      const item = sec.items.find(it => it.id === id);
      if (item) item.text = newText;
    });
  }
  G.clEditItem = null;
  renderW();
}

function deleteEditItem(id, isCustom) {
  if (isCustom) {
    G.clCustomItems = G.clCustomItems.filter(c => c.id !== id);
  } else {
    CL_DATA.forEach(sec => {
      sec.items = sec.items.filter(it => it.id !== id);
    });
    delete G.clChecks[id];
  }
  G.clEditItem = null;
  renderW();
}

function openAddInSection(section) {
  G.addSection = G.addSection === section ? null : section;
  G.clEditItem = null;
  renderW();
  setTimeout(() => {
    const ta = document.getElementById('add-text');
    if (ta) ta.focus();
  }, 100);
}

function addCustomItem() {
  const ta = document.getElementById('add-text');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const section = G.addSection || (CL_DATA[0] && CL_DATA[0].section) || '기타';
  const newId = 'custom_' + Date.now();
  G.clCustomItems.push({
    id: newId, text, section,
    src: '직접 추가', checked: true, warn: false
  });
  G.clChecks[newId] = true;
  G.addSection = null;
  renderW();
}

function startPreviewAgent(){
  const id=G.selRecips[G.previewIdx];
  const rec=RECIPS.find(r=>r.id===id);
  const piiEl=document.getElementById('preview-pii-agent');
  const reportEl=document.getElementById('preview-report-agent');
  const contentEl=document.getElementById('preview-content');
  if(!piiEl||!reportEl||!contentEl) return;

  // Masking levels per recipient
  const maskingInfo={
    manager:{level:'Level 0',detail:'기관 표준 — 전체 정보 포함'},
    nurse:{level:'Level 0',detail:'의료진 — 건강 정보 유지'},
    welfare:{level:'Level 1',detail:'이름 생략, 정서 정보 유지'},
    family:{level:'Level 2',detail:'이름 생략, 진단명 제거, 일상어 변환'},
  };
  const toneInfo={
    manager:{tone:'공식 문서체',note:''},
    nurse:{tone:'의료 전문 용어',note:''},
    welfare:{tone:'사회복지 관점',note:''},
    family:{tone:'친근한 말투 적용',note:'"기운이 없으셨어요" (우울감 완화 표현)'},
  };
  const mi=maskingInfo[id]||maskingInfo.manager;
  const ti=toneInfo[id]||toneInfo.manager;

  // Step 1: PII Agent
  piiEl.innerHTML=`<div style="background:#FAEEDA;border-radius:10px;padding:9px 12px;border:1px solid #FAC775">
    <div style="font-size:11px;font-weight:700;color:#854F0B;display:flex;align-items:center;gap:5px">
      🔒 개인정보 보호 Agent
      <div class="spin" style="width:12px;height:12px;border:2px solid #FAC775;border-top:2px solid #854F0B;border-radius:50%;margin-left:auto"></div>
    </div>
    <div style="font-size:10px;color:#854F0B;margin-top:4px" id="pii-step-text">수신자 변경: ${rec.name}</div>
  </div>`;
  contentEl.style.display='none';
  addAgentLog('🔒 PII Agent: 수신자 변경 → '+rec.name);

  setTimeout(()=>{
    const pst=document.getElementById('pii-step-text');
    if(pst) pst.textContent='마스킹 레벨: '+mi.level+' 적용 중...';
    addAgentLog('🔒 PII Agent: '+mi.level+' — '+mi.detail);
  },800);

  setTimeout(()=>{
    const pst=document.getElementById('pii-step-text');
    if(pst) pst.textContent=mi.detail;
    // Remove spinner
    piiEl.innerHTML=`<div style="background:#E1F5EE;border-radius:10px;padding:9px 12px;border:1px solid #9FE1CB">
      <div style="font-size:11px;font-weight:700;color:#0F6E56;display:flex;align-items:center;gap:5px">
        🔒 개인정보 보호 Agent <i class="ti ti-check" style="font-size:12px;color:#0F6E56;margin-left:auto"></i>
      </div>
      <div style="font-size:10px;color:#0F6E56;margin-top:4px">${mi.level} 적용 완료 — ${mi.detail}</div>
    </div>`;
  },1600);

  // Step 2: Report Agent
  setTimeout(()=>{
    reportEl.innerHTML=`<div class="report-agent-badge">
      <div style="font-size:11px;font-weight:700;color:#534AB7;display:flex;align-items:center;gap:5px">
        📄 보고서 Agent
      </div>
      <div style="font-size:10px;color:#534AB7;margin-top:4px">톤 분석: ${ti.tone}</div>
      ${ti.note?`<div style="font-size:10px;color:#7F77DD;margin-top:2px">민감도 체크: ${ti.note}</div>`:''}
    </div>`;
    addAgentLog('📄 보고서 Agent: '+ti.tone);
  },2000);

  // Show content
  setTimeout(()=>{
    contentEl.style.display='block';
    contentEl.style.animation='fadeIn .4s ease';
  },2600);
}

/* ═══ ENHANCED: Protection Agent simulation ═══ */
function startProtSimulation(){
  if(G.pAlert){
    // Reset
    G.pAlert=false;
    clearProtTimers();
    renderW();
    return;
  }
  G.pAlert=true;
  clearProtTimers();
  renderW();

  const container=document.getElementById('prot-agent-container');
  if(!container) return;

  // Show agent reasoning card
  container.innerHTML=`<div class="prot-agent-card">
    <div style="font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px">
      🧠 상황 판정 Agent
      <div class="spin" style="width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top:2px solid #fff;border-radius:50%;margin-left:auto" id="prot-spinner"></div>
    </div>
    <div id="prot-steps"></div>
    <div style="margin-top:8px;font-size:10px;color:rgba(255,255,255,.5)">
      <div style="font-weight:600;margin-bottom:3px">Tools:</div>
      <div id="prot-tools" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>`;

  const agentSteps=[
    {delay:0, text:'👁️ dB 급증 감지: 87dB', color:'#ff5c5c', tool:'get_db_levels()', log:'🛡️ 보호 Agent: dB 급증 감지 87dB'},
    {delay:1500, text:'🎤 최근 30초 전사 확인 중...', color:'#F59E0B', tool:'get_recent_transcript()', log:'🛡️ 보호 Agent: get_recent_transcript() 호출'},
    {delay:3000, text:'📜 과거 보호 이력 조회...', color:'#3B82F6', tool:'get_protection_history()', log:'🛡️ 보호 Agent: get_protection_history() 호출'},
    {delay:4500, text:'🧠 판정: 갈등 감지 — 기관 보고 필요', color:'#EF4444', tool:null, log:'🛡️ 보호 Agent: 판정 완료 — 기관 보고'},
  ];

  agentSteps.forEach((s,i)=>{
    const t=setTimeout(()=>{
      const stepsEl=document.getElementById('prot-steps');
      const toolsEl=document.getElementById('prot-tools');
      if(!stepsEl) return;

      const step=document.createElement('div');
      step.className='prot-agent-step agent-step';
      step.innerHTML=`<span style="color:${s.color}">${s.text}</span>`;
      stepsEl.appendChild(step);

      if(s.tool && toolsEl){
        const toolTag=document.createElement('span');
        toolTag.style.cssText='padding:2px 6px;background:rgba(255,255,255,.15);border-radius:4px;font-size:9px;color:rgba(255,255,255,.7)';
        toolTag.textContent=s.tool;
        toolsEl.appendChild(toolTag);
      }

      addAgentLog(s.log);

      // Remove spinner on last step
      if(i===agentSteps.length-1){
        const spinner=document.getElementById('prot-spinner');
        if(spinner) spinner.outerHTML='<i class="ti ti-check" style="font-size:14px;color:#EF4444;margin-left:auto"></i>';
      }
    },s.delay);
    G.protAgentTimers.push(t);
  });
}
