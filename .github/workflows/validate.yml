name: Validate static prototype

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  html-script-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check inline script syntax
        run: |
          node -e "const fs=require('fs'); const html=fs.readFileSync('index.html','utf8'); const scripts=[...html.matchAll(/<script[^>]*>([\\s\\S]*?)<\\/script>/gi)].map(m=>m[1]); scripts.forEach((s,i)=>{ new Function(s); console.log('script '+(i+1)+' ok'); });"
